version: '3.8'

# z_graph local development environment
# Use Graphiti + Neo4j instead of Zep Cloud

services:
  neo4j:
    image: neo4j:5.26
    container_name: zepgraph-neo4j
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt (Driver)
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

# Usage:
# 1. Start Neo4j: docker-compose -f docker-compose.local.yml up -d
# 2. Wait for health check: docker-compose -f docker-compose.local.yml ps
# 3. Open Neo4j Browser: http://localhost:7474 (username: neo4j, password: password)
# 4. Set environment variables:
#    export ZEP_BACKEND=graphiti
#    export NEO4J_URI=bolt://localhost:7687
#    export NEO4J_USER=neo4j
#    export NEO4J_PASSWORD=password
# 5. Start z_graph backend: cd backend && uv run python -m flask run
