---
# Source: neo4j-community/templates/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: z-graph
---
# Source: neo4j-community/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
  namespace: z-graph
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/password"
---
# Source: neo4j-community/templates/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: z-graph
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Source: neo4j-community/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: z-graph
spec:
  selector:
    app: neo4j-community
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  type: ClusterIP
---
# Source: neo4j-community/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-community
  namespace: z-graph
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j-community
  template:
    metadata:
      labels:
        app: neo4j-community
    spec:
      containers:
        - name: neo4j
          image: "neo4j:5.26-community"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: "[\"apoc\"]"
            - name: NEO4J_apoc_export_file_enabled
              value: "true"
            - name: NEO4J_apoc_import_file_enabled
              value: "true"
            - name: NEO4J_apoc_import_file_use__neo4j__config
              value: "true"
            - name: NEO4J_server_bolt_listen__address
              value: ":7687"
            - name: NEO4J_server_http_listen__address
              value: ":7474"
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            limits:
              cpu: 8000m
              memory: 12Gi
            requests:
              cpu: 62000m
              memory: 6Gi
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-data
