services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: imp_graph_postgres
    env_file:
      - ./backend/.env.example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imp_graph_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
