[project]
name = "imp-graph-backend"
version = "0.1.0"
description = "imp_graph backend service"
requires-python = ">=3.11"
authors = [
    { name = "imp_graph Team" }
]
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "python-dotenv",
    "pydantic-settings",
    "httpx",
    "zep-cloud",
    "langfuse",
    "debugpy",
    "openai",
    "tenacity",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]
